        <!-- PWA | scripts -->

        <script>

            let fragment = document.createDocumentFragment()

            document.querySelector("#m-header #m-search").addEventListener('input', (event)=>{
                let input = event.target.value

                document.querySelector("#numero ul").innerHTML = ""
                if(+input) {
                    db.filter(({numero})=>+numero.includes(+input))
                    .forEach(resultado=> {

                        const template = `
                            <label class="piece-surface background-color-088 text-color-012 tertiary ripple-color-048">
                                ${resultado.numero}
                                <span class="piece-ripple"></span>
                            </label>
                        `
                        fragment.appendChild(tools.create(template))

                    })
                    document.querySelector("#numero ul").appendChild(fragment)
                    document.querySelectorAll("#numero ul label").forEach(result=>{
                        result.addEventListener("click", (event)=>{
                            document.querySelectorAll(`#page-home button`)[result.innerText-1].click()
                            setTimeout(()=>document.querySelector('.close').click(),1)
                        })
                    })
                }

                fragment = document.createDocumentFragment()
                
                if(input.replace(/[0-9]/g, '') != "") {
                    
                    db.filter(({letra})=>letra
                        .split("#")
                        .filter((verso) => !verso.includes("Autor ou Tradutor:"))
                        .join("")
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/[^a-zA-Z]/g, ' ')
                        .replace(/\s+/g, ' ').trim()
                        .toLowerCase()
                        .includes(
                            input
                            .normalize("NFD")
                            .replace(/[\u0300-\u036f]/g, "")
                            .replace(/[^a-zA-Z]/g, ' ')
                            .replace(/\s+/g, ' ').trim()
                            .toLowerCase()
                        )
                    )
                    .forEach(({nome, numero, letra}, i) => {
                        if(i<51) {
                            let card = `
                                <button 
                                    popovertarget="popover-modal"
                                    name="hino"
                                    value="${numero}"
                                    class="
                                        card-list
                                        piece-surface
                                        background-color-096
                                        background-color-092-hover
                                        ripple-color-048
                                        piece-ripple-to-096
                                    "
                                >
                                    <span class="numero piece-surface background-color-088 text-color-012 tertiary">${numero}</span>
                                    <span class="nome">${nome}</span>
                                    <span class="letra piece-surface background-color-088 text-color-012 secondary">
                                        <p>${letra.split("#")[0].replace(/^\d+/,"").split("@").join("</p><p>")}</p>
                                    </span>
                                    <span class="piece-piece-ripple"></span>
                                </label>
                            `
                            fragment.appendChild(tools.create(card))
                        }
                    })
                    document.querySelector("#letra ul").innerHTML = ""
                    document.querySelector("#letra ul").appendChild(fragment)
                    document.querySelectorAll("#letra ul button").forEach(result=>{
                        result.addEventListener("click", (event)=>{
                            document.querySelectorAll(`#page-home button`)[result.value-1].click()
                            setTimeout(()=>document.querySelector('.close').click(),1)
                        })
                    })
                }
            })
        </script>

            import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-analytics.js";
            import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

            // Configuração do Firebase
            const firebaseConfig = {

                authDomain: "yahweh-shammah-74033.firebaseapp.com",
                projectId: "yahweh-shammah-74033",
                storageBucket: "yahweh-shammah-74033.firebasestorage.app",
                messagingSenderId: "1090658649746",
                appId: "1:1090658649746:web:927ffb00842f52d7d2084b",
                measurementId: "G-NTX3KHD3FN"
            };

            // Inicializa Firebase
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);
            const db = getFirestore(app); // 🔥 Firestore ativado

            // Torna a função global para o botão poder chamar
            window.carregarLetrasNoLocalStorage = async function () {
                const letrasRef = collection(db, "letras");
                const snapshot = await getDocs(letrasRef);

                const letras = [];
                let numero = 1;

                snapshot.forEach((doc) => {
                    const dados = doc.data();
                    letras.push({ ...dados, numero: numero++ });
                });

                localStorage.setItem("letras-db", JSON.stringify(letras));
                console.log("Letras carregadas no LocalStorage.");
                
                //chama home
                document.querySelector('#m-nav .piece-item').click()

            };

            if(!yahwehShammah.letrasDB.get()) carregarLetrasNoLocalStorage()

        </script>
